    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is TradeBetter?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "TradeBetter is a trading journal built specifically for options traders. You import your trade history from your broker, and TradeBetter automatically groups executions into round-trips, calculates P&L, and gives you a structured dashboard to review your performance — daily, weekly, and across your full history. Pro subscribers also get AI-powered coaching on individual trades, daily sessions, detected patterns, and weekly plans."
          }
        },
        {
          "@type": "Question",
          "name": "What brokers does TradeBetter support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "TradeBetter supports direct OAuth connections with Charles Schwab and Webull for automatic trade syncing. You can also import CSV exports from thinkorswim (TD Ameritrade) and Interactive Brokers (IBKR Activity Statements). Additional broker support is on the roadmap."
          }
        },
        {
          "@type": "Question",
          "name": "Does TradeBetter work for options traders specifically?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. TradeBetter is purpose-built for options traders. The trade grouping logic, P&L calculations, and analytics are all designed around options round-trips — grouping executions by symbol, strike, expiry, and contract type."
          }
        },
        {
          "@type": "Question",
          "name": "How does the AI coaching work in TradeBetter?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "TradeBetter uses GPT-4o to analyze your real trade data. There are four AI features: Trade Review (coaching on a specific trade's entry, sizing, and exit), Daily Debrief (session-level feedback against your goals), Pattern Detection (cross-history insights from your full trade log), and Weekly Review (a data-backed weekly plan). All AI features read your trading profile — goals, max loss targets, and gain targets — to make feedback relevant to your situation."
          }
        },
        {
          "@type": "Question",
          "name": "How much does TradeBetter cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "TradeBetter offers two plans: Basic at $10/month (or $102/year) which includes full trade import, dashboard, and analytics; and Pro at $25/month (or $255/year) which adds all four AI features (Trade Review, Daily Debrief, Pattern Detection, Weekly Review) and unlimited broker connections."
          }
        },
        {
          "@type": "Question",
          "name": "Is there an iOS app for TradeBetter?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. TradeBetter is available as a native app on the App Store for iPhone and iPad. The iOS app uses the same account as the web app, so your full journal is available across all your devices in sync."
          }
        },
        {
          "@type": "Question",
          "name": "Is my trading data secure with TradeBetter?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Your trade data is stored in your own private Firestore document and is never shared with other users or sold to third parties. Broker OAuth tokens are encrypted at rest. TradeBetter never has direct access to execute trades — connections are read-only for transaction history."
          }
        },
        {
          "@type": "Question",
          "name": "What does the Reports screen analyze?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Reports surfaces patterns across your full trade history: performance by symbol, by day of week, by time of day, by setup tag, by mistake tag, and more. The goal is to find where your real edge is and where your losses are clustering. Pro subscribers also get an AI Insights tab that synthesizes these stats into plain-language behavioral patterns."
          }
        }
